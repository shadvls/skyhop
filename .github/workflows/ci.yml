name: CI

on:
  push:
    branches: [main, void-strike]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore VoidStrike/VoidStrike.csproj

      - name: Build
        run: dotnet build VoidStrike/VoidStrike.csproj --no-restore --configuration Release

      - name: Publish
        run: dotnet publish VoidStrike/VoidStrike.csproj --no-restore --configuration Release --output publish
